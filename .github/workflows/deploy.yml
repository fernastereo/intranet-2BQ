name: 🚀 Deploy

on:
  push:
    branches: [staging]
  pull_request:
    branches: [main, master]
    types: [closed]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        type: choice
        options:
          - production
          - staging

jobs:
  # Job para validar el código en PRs
  validate:
    if: github.event_name == 'pull_request' && github.event.pull_request.merged == false
    runs-on: ubuntu-latest
    name: 🔍 Validate Code
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: 📋 Install dependencies
        run: npm ci

      - name: 🧪 Run tests
        run: npm run test:unit

      - name: 🏗️ Test build
        run: npm run build
        env:
          VITE_BASE_API_URL: ${{ secrets.VITE_BASE_API_URL }}
          VITE_BASE_URL: ${{ secrets.VITE_BASE_URL }}
          VITE_AWS_URL: ${{ secrets.VITE_AWS_URL }}

  # Job para hacer deploy a producción
  deploy-production:
    if: |
      (github.event_name == 'pull_request' && github.event.pull_request.merged == true) ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production')
    runs-on: ubuntu-latest
    name: 🚀 Deploy to Production
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: 📋 Install dependencies
        run: npm ci

      # - name: 🧪 Run tests
      #   run: npm run test:unit

      - name: 🏗️ Build for production
        run: npm run build:prod
        env:
          VITE_BASE_API_URL: ${{ secrets.VITE_BASE_API_URL }}
          VITE_BASE_URL: ${{ secrets.VITE_BASE_URL }}
          VITE_AWS_URL: ${{ secrets.VITE_AWS_URL }}

      - name: 📦 Create deployment package
        run: |
          cd dist
          zip -r ../deployment.zip .
          cd ..
          ls -la deployment.zip

      - name: 🚀 Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: /ventanilla.curaduria2barranquilla.com/app/
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            .env

      - name: ✅ Deployment Success
        run: |
          echo "🎉 Deployment to production completed successfully!"
          echo "🌐 Your site should be live at: https://ventanilla.curaduria2barranquilla.com/"
          echo "📝 Subdominio configurado correctamente"

      - name: 📧 Notify on success
        if: success()
        run: |
          echo "✅ Deployment to production completed successfully"
          echo "🕐 Deployed at: $(date)"
          echo "📝 Commit: ${{ github.sha }}"

      - name: 🚨 Notify on failure
        if: failure()
        run: |
          echo "❌ Deployment failed"
          echo "🔍 Check the logs above for details"

  # Job para hacer deploy a staging
  deploy-staging:
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/staging') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging')
    runs-on: ubuntu-latest
    name: 🚀 Deploy to Staging
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: 📋 Install dependencies
        run: npm ci

      # - name: 🧪 Run tests
      #   run: npm run test:unit

      - name: 🏗️ Build for staging
        run: npm run build:staging
        env:
          VITE_BASE_API_URL: ${{ secrets.FC_VITE_BASE_API_URL }}
          VITE_BASE_URL: ${{ secrets.FC_VITE_BASE_URL }}
          VITE_AWS_URL: ${{ secrets.FC_VITE_AWS_URL }}

      - name: 📦 Create deployment package
        run: |
          cd dist
          zip -r ../deployment-staging.zip .
          cd ..
          ls -la deployment-staging.zip

      - name: 🚀 Deploy via FTP to Staging
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FC_FTP_HOST }}
          username: ${{ secrets.FC_FTP_USERNAME }}
          password: ${{ secrets.FC_FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: /projects.fernandocueto.com/2bq/ventanilla/
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            .env

      - name: ✅ Deployment Success
        run: |
          echo "🎉 Deployment to staging completed successfully!"
          echo "🌐 Your site should be live at: https://projects.fernandocueto.com/2bq/ventanilla/"

      - name: 📧 Notify on success
        if: success()
        run: |
          echo "✅ Deployment to staging completed successfully"
          echo "🕐 Deployed at: $(date)"
          echo "📝 Commit: ${{ github.sha }}"

      - name: 🚨 Notify on failure
        if: failure()
        run: |
          echo "❌ Deployment to staging failed"
          echo "🔍 Check the logs above for details"
